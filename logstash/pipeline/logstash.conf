input {
  beats {
    port => 5044
  }
}

filter {
  # Normalize host field from Beats metadata if needed
  if [agent][type] == "filebeat" {
    mutate {
      add_field => { "[event][category]" => "authentication" }
    }
    
    # Parse Linux auth.log SSH events
    if [log][file][path] =~ "auth.log" or [log][file][path] =~ "secure" {
      grok {
        match => {
          "message" => [
            "Failed password for invalid user %{USER:user.name} from %{IP:source.ip} port %{POSINT:source.port} ssh2",
            "Failed password for %{USER:user.name} from %{IP:source.ip} port %{POSINT:source.port} ssh2",
            "Accepted password for %{USER:user.name} from %{IP:source.ip} port %{POSINT:source.port} ssh2",
            "session opened for user %{USER:user.name} by %{USER:user.target_user}\(uid=%{BASE10NUM:user.uid}\)",
            "%{USER:user.name} : user NOT in sudoers ; TTY=%{DATA:process.tty} ; PWD=%{PATH:process.working_directory} ; USER=%{USER:user.target_user} ; COMMAND=%{GREEDYDATA:process.command_line}"
          ]
        }
        add_field => { "temp_parsed" => "true" }
      }

      if "Failed" in [message] or "failed" in [message] {
        mutate {
          replace => { "[event][outcome]" => "failure" }
          replace => { "[event][action]" => "ssh_login" }
          add_field => { "[event][severity]" => 3 } # Medium severity for failed login
        }
      } else if "Accepted" in [message] {
        mutate {
          replace => { "[event][outcome]" => "success" }
          replace => { "[event][action]" => "ssh_login" }
          add_field => { "[event][severity]" => 1 } # Low severity
        }
      } else if "user NOT in sudoers" in [message] or "authentication failure" in [message] {
        mutate {
          replace => { "[event][outcome]" => "failure" }
          replace => { "[event][action]" => "privilege_escalation" }
          replace => { "[event][category]" => "iam" }
          add_field => { "[event][severity]" => 4 } # High severity for sudo misuse
        }
      }
    }
  }

  # Normalize Windows Event Logs (Winlogbeat)
  if [agent][type] == "winlogbeat" {
    # Winlogbeat already provides structured fields, let's map them to ECS if necessary
    mutate {
      rename => { "[winlog][event_id]" => "event.code" }
      rename => { "[winlog][activity]" => "event.action" }
      rename => { "[winlog][outcome]" => "event.outcome" }
    }

    # Map Event ID 4625 (Failed Logon) and 4624 (Successful Logon)
    if [event.code] == 4625 {
      mutate {
        replace => { "[event][outcome]" => "failure" }
        replace => { "[event][action]" => "win_login" }
        replace => { "[event][category]" => "authentication" }
        add_field => { "[event][severity]" => 3 }
      }
    } else if [event.code] == 4624 {
      mutate {
        replace => { "[event][outcome]" => "success" }
        replace => { "[event][action]" => "win_login" }
        replace => { "[event][category]" => "authentication" }
        add_field => { "[event][severity]" => 1 }
      }
    } else if [event.code] == 4688 { # Process Creation (useful for tracking Mimikatz or suspicious CLI)
      mutate {
        replace => { "[event][category]" => "process" }
        replace => { "[event][action]" => "process_creation" }
        add_field => { "[event][severity]" => 1 }
      }
      
      # Mark Mimikatz command line as Critical
      if [process][command_line] =~ "mimikatz" or [process][name] =~ "mimikatz" {
        mutate {
          replace => { "[event][severity]" => 5 } # Critical severity
          add_field => { "[event][action]" => "credential_dumping" }
        }
      }
    }
  }

  # Add GeoIP resolution for external source IPs
  if [source][ip] {
    # Skip private IPs to prevent Logstash geoip warnings
    if [source][ip] !~ "^10\." and [source][ip] !~ "^172\.(1[6-9]|2[0-9]|3[0-1])\." and [source][ip] !~ "^192\.168\." and [source][ip] !~ "^127\." {
      geoip {
        source => "[source][ip]"
        target => "[source][geo]"
      }
    }
  }

  # Add @timestamp format and cleanup temp fields
  mutate {
    remove_field => [ "temp_parsed" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "changeme"
    index => "siem-logs-%{+YYYY.MM.dd}"
  }
  
  # For debugging pipelines
  stdout {
    codec => rubydebug
  }
}
